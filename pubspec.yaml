name: kilometer_check
description: "Prueba técnica iTire — App Flutter que consulta el kilometraje de un vehículo mediante la API remota de Wialon."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1

  # Estado (requerido por el ejercicio)
  provider: ^6.1.2

  # Red
  http: ^1.2.2

  # Navegación
  go_router: ^16.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Generación de ícono de app y splash nativo (+ image para convertir el
  # WebP de origen a PNG). Solo se usan en tiempo de build, no en runtime.
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  image: ^4.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

# Ícono de la app (launcher) generado desde un único PNG.
flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  # Ícono adaptativo (Android 8+): logo centrado sobre el azul de marca.
  adaptive_icon_background: "#005CA8"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0A0A0A"
    theme_color: "#005CA8"

# Splash nativo (reemplaza el logo de Flutter que se ve antes del splash
# personalizado). Fondo oscuro de la marca para una transición sin saltos.
# Usa una imagen propia (más chica que el ícono adaptativo) para que el
# logo no se vea sobredimensionado en el splash.
flutter_native_splash:
  color: "#0A0A0A"
  image: "assets/icons/splash_icon.png"
  android_12:
    image: "assets/icons/splash_icon.png"
    color: "#0A0A0A"
  web: false
